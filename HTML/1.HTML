<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в iintoo</title>
    <link rel="stylesheet" href="CSS/STYLE1.CSS">
    <!-- Подключаем шрифты (например, Roboto) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <!-- ЛЕВАЯ ЧАСТЬ: Иллюстрация -->
        <div class="left-panel">
            
            <!-- Саму 3D-иллюстрацию лучше вставить фоном через CSS или как тег img -->
        </div>

        <!-- ПРАВАЯ ЧАСТЬ: Форма -->
        <div class="right-panel">
            <div class="form-wrapper">
                
                <h2>Get iintoo it today</h2>
                <p class="subtitle">There is no charge or obligation upon registration.</p>

                <!-- Социальные кнопки -->
                <div class="social-buttons">
                    <button class="btn-social btn-fb">
                        <span class="icon">f</span> Register with Facebook
                    </button>
                    <button class="btn-social btn-ln">
                        <span class="icon">in</span> Register with LinkedIn
                    </button>
                </div>

                <div class="divider">OR</div>

                <!-- Поля ввода -->
                <div class="input-group">
                    <div class="input-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" value="gus.goodwin@gmail.com">
                    </div>
                    <div class="input-field">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone">
                    </div>
                </div>

                <!-- Выбор типа инвестора -->
                <h3>What type of investor are you?</h3>
                <p class="hint-text">Select the type of investor you are below.</p>

                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="investor-type" checked>
                        <span>Individual <i class="info-icon">i</i></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="investor-type">
                        <span>Business <i class="info-icon">i</i></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="investor-type">
                        <span>IRA <i class="info-icon">i</i></span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="investor-type">
                        <span>Trust <i class="info-icon">i</i></span>
                    </label>
                </div>

                <!-- Всплывающая подсказка (описание выбранного типа) -->
                <div class="tooltip-box">
                    I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.
                </div>

                <!-- Чекбокс согласия -->
                <div class="checkbox-group">
                    <input type="checkbox" id="terms">
                    <label for="terms">I agree to the terms and receiving notifications from iintoo <a href="#">View full terms</a></label>
                </div>

                <!-- Кнопка отправки -->
                <button class="btn-submit">Create Account</button>

            </div>
        </div>
    </div>

</body>
</html>
